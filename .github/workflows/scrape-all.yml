name: Scrape All Platforms

on:
  schedule:
    - cron: '0 13 * * *'  # 5am PT daily (13:00 UTC)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install --with-deps chromium

      - name: Run orchestrator
        env:
          RESPONDENT_EMAIL: ${{ secrets.RESPONDENT_EMAIL }}
          RESPONDENT_PASS: ${{ secrets.RESPONDENT_PASS }}
          USERINTERVIEWS_EMAIL: ${{ secrets.USERINTERVIEWS_EMAIL }}
          USERINTERVIEWS_PASS: ${{ secrets.USERINTERVIEWS_PASS }}
          EBAY_SESSION_COOKIE: ${{ secrets.EBAY_SESSION_COOKIE }}
          FB_SESSION_COOKIE: ${{ secrets.FB_SESSION_COOKIE }}
        run: python scrape_all.py

      - name: Generate newspaper page
        run: python generate.py

      - name: Commit scan-data.json and index.html
        run: |
          git config user.name "Morning Pull Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scan-data.json index.html
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "Morning Pull — $(date +'%a, %b %-d')"
            git push
          fi
