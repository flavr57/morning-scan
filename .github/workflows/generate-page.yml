name: The Morning Pull — Generate Page

on:
  push:
    paths:
      - 'scan-data.json'
  workflow_dispatch:  # allow manual run from Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push index.html back to main

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate newspaper page
        run: python generate.py

      - name: Commit and push index.html
        run: |
          git config user.name "Morning Pull Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to index.html — skipping commit"
          else
            DATE_LABEL=$(date +"%B %-d, %Y")
            git commit -m "The Morning Pull — ${DATE_LABEL}"
            git push
          fi
